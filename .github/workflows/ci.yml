name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    name: typecheck · lint · build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npm run typecheck

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build
        env:
          # 建置不需真實憑證(Supabase client 於 runtime 才實例化);用 placeholder 即可
          NEXT_PUBLIC_SUPABASE_URL: http://localhost:54321
          NEXT_PUBLIC_SUPABASE_ANON_KEY: dummy-anon-key-for-build
          SUPABASE_SERVICE_ROLE_KEY: dummy-service-key-for-build
          NEXT_PUBLIC_INTERNAL_EMAIL_DOMAIN: test.local
          NEXT_TELEMETRY_DISABLED: "1"
